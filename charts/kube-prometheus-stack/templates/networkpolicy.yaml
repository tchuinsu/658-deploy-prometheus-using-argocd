{{- if .Values.networkPolicy.enabled }}
## Allow Prometheus to scrape targets in any namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kube-prometheus-stack.fullname" . }}-prometheus-egress
  namespace: {{ include "kube-prometheus-stack.namespace" . }}
  labels:
    {{- include "kube-prometheus-stack.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    ## Allow scraping all pods on metrics ports
    - ports:
        - port: 9090
        - port: 9091
        - port: 9093
        - port: 9100    # node-exporter
        - port: 8080
        - port: 8443
        - port: 10250   # kubelet
        - port: 10255   # kubelet read-only
        - port: 10257   # kube-controller-manager
        - port: 10259   # kube-scheduler
    ## Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

## Allow Grafana to reach Prometheus
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kube-prometheus-stack.fullname" . }}-grafana-ingress
  namespace: {{ include "kube-prometheus-stack.namespace" . }}
  labels:
    {{- include "kube-prometheus-stack.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
  ingress:
    ## From Grafana
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - port: 9090
    ## From Alertmanager
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - port: 9090
    ## From ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace | default "ingress-nginx" }}
      ports:
        - port: 9090
{{- end }}
