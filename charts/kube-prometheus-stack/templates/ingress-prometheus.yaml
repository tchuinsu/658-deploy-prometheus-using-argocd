{{- if .Values.prometheusIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kube-prometheus-stack.fullname" . }}-prometheus
  namespace: {{ include "kube-prometheus-stack.namespace" . }}
  labels:
    {{- include "kube-prometheus-stack.wrapperLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
  annotations:
    {{- with .Values.prometheusIngress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.prometheusIngress.ingressClassName }}
  ingressClassName: {{ .Values.prometheusIngress.ingressClassName }}
  {{- end }}
  {{- if .Values.prometheusIngress.tls }}
  tls:
    {{- toYaml .Values.prometheusIngress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.prometheusIngress.host | quote }}
      http:
        paths:
          - path: {{ .Values.prometheusIngress.path | default "/" }}
            pathType: {{ .Values.prometheusIngress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .Release.Name }}-kube-prometheus-stack-prometheus
                port:
                  number: 9090
{{- end }}
