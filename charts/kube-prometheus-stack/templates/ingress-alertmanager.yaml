{{- if .Values.alertmanagerIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kube-prometheus-stack.fullname" . }}-alertmanager
  namespace: {{ include "kube-prometheus-stack.namespace" . }}
  labels:
    {{- include "kube-prometheus-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
  annotations:
    {{- with .Values.alertmanagerIngress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.alertmanagerIngress.ingressClassName }}
  ingressClassName: {{ .Values.alertmanagerIngress.ingressClassName }}
  {{- end }}
  {{- if .Values.alertmanagerIngress.tls }}
  tls:
    {{- toYaml .Values.alertmanagerIngress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.alertmanagerIngress.host | quote }}
      http:
        paths:
          - path: {{ .Values.alertmanagerIngress.path | default "/" }}
            pathType: {{ .Values.alertmanagerIngress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .Release.Name }}-kube-prometheus-stack-alertmanager
                port:
                  number: 9093
{{- end }}
