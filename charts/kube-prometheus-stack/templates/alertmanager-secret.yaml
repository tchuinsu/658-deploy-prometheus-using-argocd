{{- if .Values.alertmanagerConfigSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.alertmanagerConfigSecret.name | default "alertmanager-config" }}
  namespace: {{ include "kube-prometheus-stack.namespace" . }}
  labels:
    {{- include "kube-prometheus-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: {{ .Values.alertmanagerConfigSecret.resolveTimeout | default "5m" }}
      {{- if .Values.alertmanagerConfigSecret.slackApiUrl }}
      slack_api_url: {{ .Values.alertmanagerConfigSecret.slackApiUrl | quote }}
      {{- end }}
      {{- if .Values.alertmanagerConfigSecret.pagerdutyUrl }}
      pagerduty_url: {{ .Values.alertmanagerConfigSecret.pagerdutyUrl | quote }}
      {{- end }}

    templates: []

    route:
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: {{ .Values.alertmanagerConfigSecret.repeatInterval | default "12h" }}
      receiver: {{ .Values.alertmanagerConfigSecret.defaultReceiver | default "null" | quote }}
      routes:
        ## Silence Watchdog — it is a synthetic always-firing alert
        - matchers:
            - name: alertname
              value: Watchdog
          receiver: "null"
        {{- if .Values.alertmanagerConfigSecret.slackApiUrl }}
        - matchers:
            - name: severity
              value: critical
          receiver: slack-critical
        - matchers:
            - name: severity
              value: warning
          receiver: slack-warning
        {{- end }}

    receivers:
      - name: "null"
      {{- if .Values.alertmanagerConfigSecret.slackApiUrl }}
      - name: slack-critical
        slack_configs:
          - channel: {{ .Values.alertmanagerConfigSecret.slackCriticalChannel | default "#alerts-critical" | quote }}
            send_resolved: true
            title: '[{{ "{{" }} .Status | toUpper {{ "}}" }}{{ "{{" }} if eq .Status "firing" {{ "}}" }}:{{ "{{" }} .Alerts.Firing | len {{ "}}" }}{{ "{{" }} end {{ "}}" }}] {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
            text: |
              {{ "{{" }} range .Alerts {{ "}}" }}
              *Alert:* {{ "{{" }} .Annotations.summary {{ "}}" }}
              *Description:* {{ "{{" }} .Annotations.description {{ "}}" }}
              *Severity:* {{ "{{" }} .Labels.severity {{ "}}" }}
              *Namespace:* {{ "{{" }} .Labels.namespace {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
      - name: slack-warning
        slack_configs:
          - channel: {{ .Values.alertmanagerConfigSecret.slackWarningChannel | default "#alerts-warning" | quote }}
            send_resolved: true
            title: '[{{ "{{" }} .Status | toUpper {{ "}}" }}] {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
            text: |
              {{ "{{" }} range .Alerts {{ "}}" }}
              *Alert:* {{ "{{" }} .Annotations.summary {{ "}}" }}
              *Severity:* {{ "{{" }} .Labels.severity {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
      {{- end }}
{{- end }}
