{{- if .Values.customServiceMonitors.enabled }}
{{- range .Values.customServiceMonitors.monitors }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kube-prometheus-stack.fullname" $ }}-{{ .name }}
  namespace: {{ include "kube-prometheus-stack.namespace" $ }}
  labels:
    {{- include "kube-prometheus-stack.labels" $ | nindent 4 }}
    release: {{ $.Release.Name }}
    app: kube-prometheus-stack
spec:
  namespaceSelector:
    {{- if .matchAllNamespaces }}
    any: true
    {{- else }}
    matchNames:
      {{- toYaml .namespaces | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      {{- toYaml .selector | nindent 6 }}
  endpoints:
    {{- toYaml .endpoints | nindent 4 }}
{{- end }}
{{- end }}
