{{- if .Values.grafanaAdminSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.grafanaAdminSecret.name | default "grafana-admin-credentials" }}
  namespace: {{ include "kube-prometheus-stack.namespace" . }}
  labels:
    {{- include "kube-prometheus-stack.wrapperLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  annotations:
    ## Tell ArgoCD to ignore drift on this Secret (values managed externally)
    argocd.argoproj.io/compare-options: IgnoreExtraneousFormattingDifferences=true
type: Opaque
stringData:
  admin-user: {{ .Values.grafanaAdminSecret.adminUser | default "admin" | quote }}
  admin-password: {{ required "grafanaAdminSecret.adminPassword is required when grafanaAdminSecret.create=true" .Values.grafanaAdminSecret.adminPassword | quote }}
{{- end }}
